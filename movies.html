<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit | Movie</title>

    <link rel="stylesheet" href="css/movies.css">
</head>
<body>
<div class="background-image"></div>
<div class="background-overlay"></div>
    <!-- Header -->
    <header>

        <a href="index.html" class="back-btn">← Back to Home</a>

        <div class="logo">
    <a href="index.html">
        <img src="image/image.png" alt="Orbit Logo">
    </a>
</div>

    </header>

   <!-- Background -->
<div class="background-image"></div>
<div class="background-overlay"></div>

<!-- Glass Card -->
<div class="movie-card">

    <!-- Hero -->
    <section class="movie-hero">

        <img id="movie-poster" src="" alt="Movie Poster">

        <div class="movie-info">

            <h1 id="movie-title"></h1>

            <p id="movie-genre"></p>

            <div class="movie-meta">

                <span id="movie-rating"></span>

                <span id="movie-year"></span>

                <span id="movie-duration"></span>

            </div>

            <p id="movie-description"></p>

            <div class="movie-buttons">

                <button id="watch-btn">▶ Watch Trailer</button>

                <button id="fav-btn">❤️ My List</button>

            </div>

        </div>

    </section>

    <!-- Cast -->
    <section class="cast-section">

        <h2>Cast</h2>

        <div id="movie-cast"></div>

    </section>

    <!-- Similar Movies -->
    <section class="similar-section">

        <h2>You May Also Like</h2>

        <div id="similar-movies"></div>

    </section>

</div>

    <script src="js/data.js"></script>
    <script src="js/movies.js"></script>

</body>
</html>
